name: familyhub
description: A wall-display Android app for family organization.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  flutter_riverpod: ^2.6.1
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  intl: ^0.19.0

  async: ^2.11.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
